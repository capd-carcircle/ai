name: AI Service CI/CD

on:
  push:
    branches: [main]

jobs:
  # ── 1단계: CI ─────────────────────────────────────────────
  ci:
    name: CI — Install & Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (CPU-only torch)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Syntax check (entry point)
        run: python -m py_compile main.py

  # ── 2단계: Docker 이미지 빌드 & Docker Hub 푸시 ────────────
  build-and-push:
    name: Build & Push Image
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/capd-ai
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3단계: 서버 배포 ──────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/capd

            echo "==> Pulling latest AI image..."
            docker compose -f docker-compose.prod.yml pull ai

            echo "==> Restarting AI container..."
            docker compose -f docker-compose.prod.yml up -d --no-deps ai

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Deploy complete!"
            docker ps --filter "name=capd_ai"
